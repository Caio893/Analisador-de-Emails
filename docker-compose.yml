services:
  backend:
    build:
      context: ./backend
    image: mailguard-ai-backend
    container_name: mailguard_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8080}
      OAUTHLIB_INSECURE_TRANSPORT: ${OAUTHLIB_INSECURE_TRANSPORT:-1}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      ANALYSIS_QUEUE_ENABLED: ${ANALYSIS_QUEUE_ENABLED:-true}
      OPENAI_BULK_MODEL: ${OPENAI_BULK_MODEL:-gpt-4.1-mini}
      OPENAI_RETRY_ATTEMPTS: ${OPENAI_RETRY_ATTEMPTS:-2}
      OPENAI_RETRY_BASE_SECONDS: ${OPENAI_RETRY_BASE_SECONDS:-1}
      OPENAI_DAILY_ANALYSIS_LIMIT: ${OPENAI_DAILY_ANALYSIS_LIMIT:-0}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, urllib.parse, urllib.request; host = urllib.parse.urlparse(os.environ.get('BACKEND_URL', 'http://localhost:8000')).netloc or 'localhost:8000'; req = urllib.request.Request('http://127.0.0.1:8000/api/healthz/', headers={'Host': host}); urllib.request.urlopen(req, timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  analysis-worker:
    image: mailguard-ai-backend
    build:
      context: ./backend
    container_name: mailguard_analysis_worker
    restart: unless-stopped
    command: python manage.py process_email_analysis_queue
    env_file:
      - .env
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      OAUTHLIB_INSECURE_TRANSPORT: ${OAUTHLIB_INSECURE_TRANSPORT:-1}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      ANALYSIS_QUEUE_ENABLED: ${ANALYSIS_QUEUE_ENABLED:-true}
      OPENAI_BULK_MODEL: ${OPENAI_BULK_MODEL:-gpt-4.1-mini}
      OPENAI_RETRY_ATTEMPTS: ${OPENAI_RETRY_ATTEMPTS:-2}
      OPENAI_RETRY_BASE_SECONDS: ${OPENAI_RETRY_BASE_SECONDS:-1}
      OPENAI_DAILY_ANALYSIS_LIMIT: ${OPENAI_DAILY_ANALYSIS_LIMIT:-0}
      RUN_STARTUP_TASKS: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/mailguard-ai-dashboard
      dockerfile: ../Dockerfile
    container_name: mailguard_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
      VITE_USE_MOCKS: ${VITE_USE_MOCKS:-false}
    volumes:
      - ./frontend/mailguard-ai-dashboard:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "8080:8080"
    depends_on:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8080', { method: 'GET' }).then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16
    container_name: mailguard_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mailguard}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: mailguard_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  frontend_node_modules:
